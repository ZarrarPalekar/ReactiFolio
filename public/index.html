    <!-- Modern Loading Spinner Styling -->
    <style>
      .overlay {
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        position: fixed;
        background: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        z-index: 9999;
      }

      .overlay__inner {
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        position: absolute;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .overlay__content {
        text-align: center;
      }

      /* Modern Gradient Spinner */
      .modern-spinner {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: conic-gradient(
          from 0deg,
          transparent 0deg,
          #8b5cf6 90deg,
          #14b8a6 180deg,
          #f472b6 270deg,
          transparent 360deg
        );
        animation: spin 1s linear infinite;
        position: relative;
      }

      .modern-spinner::before {
        content: "";
        position: absolute;
        inset: 4px;
        background: #0a0a0f;
        border-radius: 50%;
      }

      .loading-text {
        margin-top: 20px;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 14px;
        font-weight: 500;
        background: linear-gradient(135deg, #a78bfa, #2dd4bf, #f9a8d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 0.1em;
        animation: pulse 1.5s ease-in-out infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
    </style>
